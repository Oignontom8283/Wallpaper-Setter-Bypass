name: Package Release

on:
  release:
    types: [published, created]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version from release
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create ZIP package
        run: |
          mkdir -p Wallpaper-Setter-Bypass
          cp wallpaper_setter.ps1 Wallpaper-Setter-Bypass/
          cp launcher.bat Wallpaper-Setter-Bypass/
          cp .package/README.txt Wallpaper-Setter-Bypass/
          zip -r Wallpaper-Setter-Bypass_v${{ steps.version.outputs.VERSION }}.zip Wallpaper-Setter-Bypass/
      
      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: Wallpaper-Setter-Bypass_v*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
