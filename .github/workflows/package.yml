name: Package Release

on:
  push:
    tags:
      - 'v*'  # Matches v0.2, v1.0.0, v1.0.0-beta, etc.

permissions:
  contents: write
  packages: read

jobs:
  package:
    runs-on: ubuntu-latest
    name: Build and Release Package
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags
      
      - name: Set executable permission on packager script
        run: chmod +x .github/scripts/packager.sh
      
      - name: Run packager script
        id: package
        run: ./.github/scripts/packager.sh
      
      - name: Verify package file
        run: |
          ls -lh Wallpaper-Setter-Bypass_v*.zip
          file Wallpaper-Setter-Bypass_v*.zip
      
      - name: Display package information
        run: |
          echo "Package Information:"
          echo "  Version: ${{ steps.package.outputs.VERSION }}"
          echo "  File: ${{ steps.package.outputs.ZIP_FILE }}"
          echo ""
          ls -lh Wallpaper-Setter-Bypass_v*.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wallpaper-Setter-Bypass-v${{ steps.package.outputs.VERSION }}
          path: Wallpaper-Setter-Bypass_v*.zip
          retention-days: 90
          if-no-files-found: error
          compression-level: 0  # ZIP is already compressed
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Wallpaper-Setter-Bypass_v*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Wallpaper Setter Bypass v${{ steps.package.outputs.VERSION }}
            
            This release includes:
            - `wallpaper_setter.ps1` - Main PowerShell script
            - `launcher.bat` - Windows batch launcher
            - `README.txt` - Quick start guide
            
            ### Installation
            1. Extract the ZIP file
            2. Run `launcher.bat` or the PowerShell script directly
            3. Follow the GUI or use CLI options
            
            For full documentation, visit the [GitHub repository](https://github.com/${{ github.repository }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
